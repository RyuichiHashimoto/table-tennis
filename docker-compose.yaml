services:

  table-tennis-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
    command: uv run uvicorn table_tennis_backend.main:app --host 0.0.0.0 --port 8000 --reload
    container_name: table-tennis-backend

  table-tennis-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "42000:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    command: sh /app/docker-entrypoint.sh
    depends_on:
      - table-tennis-backend
    container_name: table-tennis-frontend

volumes:
  frontend_node_modules:
