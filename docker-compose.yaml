services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    env_file:
      - .env
    command: uv run streamlit run backend/app.py --server.port=8501 --server.address=0.0.0.0

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    command: uv run uvicorn backend.api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm start"
    depends_on:
      - api

#  60.00s / 終了 744.00s

volumes:
  frontend_node_modules:
