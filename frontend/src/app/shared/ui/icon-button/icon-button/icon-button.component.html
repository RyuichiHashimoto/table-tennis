<button
  type="button"
  class="icon-button-root ui-button ui-button-icon"
  [class.no-border]="!showBorder"
  [class.ui-button-danger]="danger"
  [attr.aria-label]="ariaLabel || null"
  [disabled]="disabled"
  (click)="clicked.emit()"
>
  <img [src]="src" [alt]="alt" width="18" height="18" />
  <span class="tooltip" aria-hidden="true" *ngIf="ariaLabel">{{ ariaLabel }}</span>
</button>
