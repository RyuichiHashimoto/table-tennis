<div class="modal-overlay" *ngIf="open" (click)="onBackdropClick($event)">
  <section class="modal-card ui-panel" role="dialog" aria-modal="true" [attr.aria-label]="title">
    <header class="modal-head">
      <h2>{{ title }}</h2>
    </header>
    <div class="modal-body">
      <p>{{ message }}</p>
    </div>
    <footer class="modal-actions">
      <button type="button" class="modal-button ui-button" (click)="cancelled.emit()">{{ cancelLabel }}</button>
      <button
        type="button"
        class="modal-button ui-button"
        [class.ui-button-danger]="tone === 'danger'"
        [class.danger]="tone === 'danger'"
        (click)="confirmed.emit()"
      >
        {{ confirmLabel }}
      </button>
    </footer>
  </section>
</div>
