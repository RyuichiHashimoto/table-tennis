<article class="panel video-panel">
  <ng-container *ngIf="videoSourceUrl; else videoPlaceholder">
    <div class="video-player-wrap">
      <video
        #videoPlayer
        class="video-player"
        [src]="videoSourceUrl"
        controls
        preload="metadata"
        (timeupdate)="onVideoTimeUpdate($event)"
        (loadedmetadata)="onVideoTimeUpdate($event)"
      ></video>
      <div class="video-caption">{{ videoTitle || '動画再生' }}</div>
    </div>
  </ng-container>
  <ng-template #videoPlaceholder>
    <div class="video-placeholder">
      <strong>動画再生</strong>
      <span>手動で動画をアップロードするか、YouTube URL を入力して読み込んでください。</span>
      <label class="upload-button">
        動画アップロード
        <input type="file" accept="video/*" (change)="onSelectVideoFile($event)" />
      </label>
    </div>
  </ng-template>
  <div class="video-url-bar" *ngIf="!videoSourceUrl">
    <label>YouTube URL
      <input [ngModel]="youtubeUrl" (ngModelChange)="onYoutubeUrlChange($event)" placeholder="https://www.youtube.com/watch?v=..." />
    </label>
    <div class="video-url-actions">
      <button type="button" (click)="onLoadYoutube()" [disabled]="isLoadingVideo">
        {{ isLoadingVideo ? '読込中...' : 'OK' }}
      </button>
    </div>
  </div>
</article>
