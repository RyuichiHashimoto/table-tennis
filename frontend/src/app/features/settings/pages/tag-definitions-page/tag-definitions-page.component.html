<section class="settings-card settings-card-wide ui-card">
  <div class="settings-card-head">
    <strong>タグ一覧</strong>
    <button type="button" class="tag-add-button ui-button" (click)="openCreateModal()">追加</button>
  </div>
  <div class="tag-table-wrap ui-table-wrap">
    <table class="tag-table ui-table">
      <thead>
        <tr>
          <th>タグ</th>
          <th>対象</th>
          <th>得失点</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tag of tagDefinitions">
          <td>{{ tag.tag }}</td>
          <td>
            <div class="tag-scope-summary">
              <span class="tag-scope-chip ui-chip" *ngFor="let scope of getRallyScopeLabels(tag)">{{ scope }}</span>
            </div>
          </td>
          <td>
            <div class="tag-scope-summary">
              <span class="tag-scope-chip ui-chip" *ngFor="let scope of getPointScopeLabels(tag)">{{ scope }}</span>
            </div>
          </td>
          <td class="tag-action-cell">
            <div class="tag-row-actions">
              <button type="button" class="tag-edit-button ui-button ui-button-sm" (click)="openEditModal(tag)">edit</button>
              <button type="button" class="tag-delete-button ui-button ui-button-sm ui-button-danger" (click)="deleteTag(tag)">delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

<div class="tag-edit-overlay" *ngIf="editModalOpen" (click)="closeEditModal()">
  <section class="tag-edit-modal ui-panel" role="dialog" aria-modal="true" aria-label="タグ編集" (click)="$event.stopPropagation()">
    <header class="tag-edit-head">
      <h3>{{ isCreatingTag ? 'タグ追加' : 'タグ編集' }}</h3>
    </header>

    <div class="tag-edit-body">
      <label>
        <span>タグ名</span>
        <input type="text" class="ui-input" [(ngModel)]="editForm.tag" />
      </label>

      <fieldset class="tag-edit-fieldset">
        <legend>対象ラリー</legend>
        <label>
          <input type="checkbox" [(ngModel)]="editForm.myRallyEnabled" />
          <span>自ラリー</span>
        </label>
        <label>
          <input type="checkbox" [(ngModel)]="editForm.opponentRallyEnabled" />
          <span>相手ラリー</span>
        </label>
      </fieldset>

      <fieldset class="tag-edit-fieldset">
        <legend>対象得失点時</legend>
        <label>
          <input type="checkbox" [(ngModel)]="editForm.lossEnabled" />
          <span>失点時</span>
        </label>
        <label>
          <input type="checkbox" [(ngModel)]="editForm.winEnabled" />
          <span>得点時</span>
        </label>
      </fieldset>
    </div>

    <footer class="tag-edit-actions">
      <button type="button" class="ui-button" (click)="closeEditModal()">キャンセル</button>
      <button type="button" class="ui-button btn-primary" (click)="saveEdit()">保存</button>
    </footer>
  </section>
</div>

<app-confirm-modal
  [open]="!!pendingDeleteTag"
  title="タグを削除"
  [message]="'「' + pendingDeleteTag?.tag + '」を削除します。'"
  confirmLabel="削除する"
  cancelLabel="キャンセル"
  tone="danger"
  (cancelled)="cancelDeleteTag()"
  (confirmed)="confirmDeleteTag()"
></app-confirm-modal>
