<section class="settings-card settings-card-wide ui-card">
  <div class="settings-card-head">
    <strong>タグ一覧</strong>
    <button type="button" class="tag-add-button ui-button" aria-label="タグを追加" (click)="openCreateModal()">
      <ui-add-icon [size]="16"></ui-add-icon>
      追加
    </button>
  </div>
  <ui-standard-table [empty]="tagDefinitions.length === 0" emptyMessage="パターンがありません。">
    <table class="tag-table ui-table">
      <thead>
        <tr>
          <th>パターン名</th>
          <th>対象プレイヤー</th>
          <th>局面</th>
          <th>種別</th>
          <th>結果</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tag of tagDefinitions">
          <td>{{ tag.tag }}</td>
          <td>
            <span class="tag-scope-chip ui-chip" [class.chip-me]="tag.playerSide === 'me'" [class.chip-op]="tag.playerSide === 'op'">
              {{ playerSideLabel(tag.playerSide) }}
            </span>
          </td>
          <td>
            <span class="tag-scope-chip ui-chip">{{ phaseLabel(tag.phase) }}</span>
          </td>
          <td>
            <span class="tag-scope-chip ui-chip" [class.chip-miss]="tag.shotType === 'miss'" [class.chip-point]="tag.shotType === 'point'">
              {{ shotTypeLabel(tag.shotType) }}
            </span>
          </td>
          <td>
            <span class="result-chip" [class.result-me]="pointWinnerLabel(tag) === '自分の得点'" [class.result-op]="pointWinnerLabel(tag) === '相手の得点'">
              {{ pointWinnerLabel(tag) }}
            </span>
          </td>
          <td class="tag-action-cell">
            <div class="tag-row-actions">
              <button type="button" class="tag-edit-button ui-button ui-button-sm" aria-label="編集" (click)="openEditModal(tag)">
                <ui-edit-icon [size]="16"></ui-edit-icon>
              </button>
              <button type="button" class="tag-delete-button ui-button ui-button-sm ui-button-danger" aria-label="削除" (click)="deleteTag(tag)">
                <ui-delete-icon [size]="16"></ui-delete-icon>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </ui-standard-table>
</section>

<div class="tag-edit-overlay" *ngIf="editModalOpen" (click)="closeEditModal()">
  <section class="tag-edit-modal ui-panel" role="dialog" aria-modal="true" aria-label="タグ編集" (click)="$event.stopPropagation()">
    <header class="tag-edit-head">
      <h3>{{ isCreatingTag ? 'タグ追加' : 'タグ編集' }}</h3>
    </header>

    <div class="tag-edit-body">
      <label class="edit-field">
        <span>パターン名</span>
        <input type="text" class="ui-input" [(ngModel)]="editForm.tag" placeholder="例：サーブミス" />
      </label>

      <label class="edit-field">
        <span>対象プレイヤー</span>
        <select class="ui-input" [(ngModel)]="editForm.playerSide">
          <option *ngFor="let opt of playerSideOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>

      <label class="edit-field">
        <span>局面</span>
        <select class="ui-input" [(ngModel)]="editForm.phase">
          <option *ngFor="let opt of phaseOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>

      <label class="edit-field">
        <span>種別</span>
        <select class="ui-input" [(ngModel)]="editForm.shotType">
          <option *ngFor="let opt of shotTypeOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </label>

      <p class="tag-error-message" *ngIf="editErrorMessage">{{ editErrorMessage }}</p>
    </div>

    <footer class="tag-edit-actions">
      <button type="button" class="ui-button" (click)="closeEditModal()">キャンセル</button>
      <button type="button" class="ui-button btn-primary" (click)="saveEdit()">保存</button>
    </footer>
  </section>
</div>

<app-confirm-modal
  [open]="!!pendingDeleteTag"
  title="タグを削除"
  [message]="'「' + pendingDeleteTag?.tag + '」を削除します。'"
  confirmLabel="削除する"
  cancelLabel="キャンセル"
  tone="danger"
  [errorMessage]="deleteErrorMessage"
  (cancelled)="cancelDeleteTag()"
  (confirmed)="confirmDeleteTag()"
></app-confirm-modal>
