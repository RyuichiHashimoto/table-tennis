<article class="ui-panel">
  <h3>Buttons</h3>
  <div class="button-showcase">
    <div class="button-sample">
      <span>プライマリー</span>
      <button type="button" class="ui-button btn-primary">Primary</button>
    </div>
    <div class="button-sample">
      <span>セカンダリー</span>
      <button type="button" class="ui-button ui-button-secondary">Secondary</button>
    </div>
    <div class="button-sample">
      <span>ターシャリー</span>
      <button type="button" class="ui-button ui-button-tertiary">Tertiary</button>
    </div>
    <div class="button-sample">
      <span>デンジャー</span>
      <button type="button" class="ui-button ui-button-danger">Danger</button>
    </div>
    <div class="button-sample">
      <span>アイコン</span>
      <button type="button" class="ui-button ui-button-icon" aria-label="Add">+</button>
    </div>
    <div class="button-sample">
      <span>Danger アイコン</span>
      <ui-icon-button
        src="/assets/icons/danger-trashbox.svg"
        alt=""
        ariaLabel="Delete"
        [danger]="true"
        [showBorder]="false"
      ></ui-icon-button>
    </div>
    <div class="button-sample">
      <span>画像アイコン（枠あり）</span>
      <ui-icon-button
        src="/assets/icons/trashbox.svg"
        alt="削除"
        ariaLabel="削除"
        [showBorder]="true"
      ></ui-icon-button>
    </div>
    <div class="button-sample">
      <span>画像アイコン（枠なし）</span>
      <ui-icon-button
        src="/assets/icons/trashbox.svg"
        alt="削除"
        ariaLabel="削除"
        [showBorder]="false"
      ></ui-icon-button>
    </div>
    <div class="button-sample">
      <span>ディスエーブル</span>
      <button type="button" class="ui-button btn-primary" disabled>Disabled</button>
    </div>
    <div class="button-sample">
      <span>フローティング</span>
      <button type="button" class="ui-button ui-button-floating" aria-label="Create">+</button>
    </div>
    <div class="button-sample">
      <span>モーダル表示</span>
      <div class="button-row">
        <button type="button" class="ui-button ui-button-secondary" (click)="openModal('default')">Open Modal</button>
        <button type="button" class="ui-button ui-button-danger" (click)="openModal('danger')">Open Danger Modal</button>
        <button type="button" class="ui-button btn-primary" (click)="openFormModal()">Open Form Modal</button>
      </div>
    </div>
  </div>

  <h3>Chips</h3>
  <div class="chip-row">
    <span class="ui-chip">Default</span>
    <span class="ui-chip neon">Neon</span>
    <span class="ui-chip ui-button-active">Active</span>
  </div>
</article>

<app-confirm-modal
  [open]="isDefaultModalOpen"
  title="標準モーダル"
  message="共通 confirm modal の標準トーン表示です。"
  confirmLabel="OK"
  cancelLabel="閉じる"
  (confirmed)="closeModal('default')"
  (cancelled)="closeModal('default')"
></app-confirm-modal>

<app-confirm-modal
  [open]="isDangerModalOpen"
  title="危険モーダル"
  message="削除や破壊的操作に使う danger トーンの確認用です。"
  confirmLabel="削除する"
  cancelLabel="キャンセル"
  tone="danger"
  (confirmed)="closeModal('danger')"
  (cancelled)="closeModal('danger')"
></app-confirm-modal>

<app-modal
  [open]="isFormModalOpen"
  title="入力モーダル"
  width="560px"
  (backdropClicked)="closeFormModal()"
>
  <p modal-content>shared/ui/modal に feature 側のフォーム内容を載せた表示です。</p>

  <div modal-content class="modal-fields">
    <label>
      <span>タイトル</span>
      <input class="ui-input" type="text" placeholder="例: 新しいカード" [(ngModel)]="sampleModalTitle" />
    </label>
    <label>
      <span>カテゴリ</span>
      <select class="ui-input" [(ngModel)]="sampleModalCategory">
        <option value="panel">Panel</option>
        <option value="card">Card</option>
        <option value="modal">Modal</option>
      </select>
    </label>
    <label>
      <span>優先度</span>
      <input class="ui-input" type="number" [(ngModel)]="sampleModalPriority" />
    </label>
    <label>
      <span>メモ</span>
      <textarea class="ui-input" rows="5" placeholder="複数行メモを入力できます" [(ngModel)]="sampleModalNote"></textarea>
    </label>
  </div>

  <ng-container modal-actions>
    <button type="button" class="ui-button" (click)="closeFormModal()">閉じる</button>
    <button type="button" class="ui-button btn-primary" (click)="submitFormModal()">保存</button>
  </ng-container>
</app-modal>
