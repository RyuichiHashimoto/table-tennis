<article class="ui-panel">
  <h3>Table</h3>
  <ui-standard-table [empty]="sampleRows.length === 0" emptyMessage="データがありません。">
    <table class="ui-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>種別</th>
          <th>状態</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of sampleRows">
          <td>{{ row.name }}</td>
          <td>{{ row.category }}</td>
          <td><span class="ui-chip">{{ row.state }}</span></td>
        </tr>
      </tbody>
    </table>
  </ui-standard-table>
</article>

<article class="ui-panel sortable-section">
  <h3>Sortable Table</h3>
  <ui-sortable-table
    [rows]="sortableRows"
    (dropped)="onDrop($event)"
  ></ui-sortable-table>

  <div class="sortable-footer">
    <div class="save-status" [class.visible]="saveStatus === 'saved'">✓ 保存しました</div>
    <div class="sortable-actions">
      <button type="button" class="ui-button" (click)="showResetModal = true">リセット</button>
      <button
        type="button"
        class="ui-button ui-button-primary"
        [disabled]="!hasPendingChanges"
        (click)="onSave()"
      >保存</button>
    </div>
  </div>
</article>

<app-confirm-modal
  [open]="showResetModal"
  title="リセットの確認"
  message="並び順を初期状態に戻します。保存済みの変更も失われます。よろしいですか？"
  confirmLabel="リセット"
  cancelLabel="キャンセル"
  tone="danger"
  (confirmed)="onResetConfirm()"
  (cancelled)="showResetModal = false"
></app-confirm-modal>
