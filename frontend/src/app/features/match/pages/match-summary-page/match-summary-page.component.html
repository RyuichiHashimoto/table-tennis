<section class="summary-page">
  <app-notice-chip *ngIf="isLoading">試合情報を読み込んでいます</app-notice-chip>
  <app-notice-chip *ngIf="loadError" tone="danger">{{ loadError }}</app-notice-chip>

  <app-match-page-header [match]="match" activeView="summary"></app-match-page-header>

  <article class="match-overview-card" *ngIf="match">
    <section class="overview-result" [class.win]="matchResultClass === 'win'" [class.loss]="matchResultClass === 'loss'">
      <span>試合結果</span>
      <strong>{{ matchResultLabel }}</strong>
    </section>

    <section class="overview-info">
      <dl>
        <div>
          <dt>日時</dt>
          <dd>{{ matchDateLabel }}</dd>
        </div>
        <div>
          <dt>試合名</dt>
          <dd>{{ match.title }}</dd>
        </div>
        <div>
          <dt>選手</dt>
          <dd>{{ match.myPlayerName }} vs {{ match.opponentPlayerName }}</dd>
        </div>
      </dl>
    </section>

    <section class="overview-sets">
      <h2>セット結果</h2>
      <div class="overview-set-list">
        <div class="overview-set-card" *ngFor="let set of setSummaries">
          <span>セット {{ set.setNo }}</span>
          <strong>{{ set.myPoints }} - {{ set.opPoints }}</strong>
        </div>
        <div class="set-score-empty" *ngIf="!setSummaries.length">記録されたセットがありません</div>
      </div>
    </section>

    <section class="overview-note">
      <h2>要約</h2>
      <p>{{ matchSummaryText }}</p>
    </section>
  </article>

  <article class="summary-card score-line-card">
    <app-score-line-chart
      [points]="scoreLinePoints"
      [segments]="scoreLineSegments"
      [yMin]="-12"
      [yMax]="12"
      [yTickStep]="4"
    ></app-score-line-chart>
  </article>

  <div class="filter-card" *ngIf="setSummaries.length > 0">
    <span class="filter-label">分析対象</span>
    <div class="filter-set-buttons">
      <button
        *ngFor="let set of setSummaries"
        type="button"
        class="filter-btn"
        [class.active]="selectedSetNos.has(set.setNo)"
        (click)="toggleSetNo(set.setNo)"
      >
        セット {{ set.setNo }}
      </button>
    </div>
  </div>

  <section class="analysis-grid">
    <app-factor-bar-chart
      title="得点要因"
      [rows]="scoreFactorRows"
    ></app-factor-bar-chart>

    <app-factor-bar-chart
      title="失点要因"
      totalLabel="合計失点"
      [rows]="lossFactorRows"
    ></app-factor-bar-chart>

    <app-split-bar-chart
      title="サーブ・レシーブ分析"
      leftLabel="自分"
      rightLabel="相手"
      [rows]="serveReceiveRows"
    ></app-split-bar-chart>
  </section>
</section>
