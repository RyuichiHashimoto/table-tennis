<div class="drawer-overlay" [class.open]="isOpen" (click)="close.emit()"></div>

<aside class="drawer" [class.open]="isOpen" role="dialog" aria-label="記録を編集">
  <header class="drawer-head">
    <h2>記録を編集</h2>
    <button type="button" class="close-btn" aria-label="閉じる" (click)="close.emit()">✕</button>
  </header>

  <ng-container *ngIf="rally; else emptyState">
    <div class="drawer-body">
      <p class="rally-meta">
        No.{{ rally.id }}
        <span *ngIf="rally.tStart !== undefined"> / {{ formatClock(rally.tStart) }}</span>
        / セット{{ rally.setNo }}
      </p>

      <div class="field-group">
        <span class="field-label">結果</span>
        <div class="result-buttons">
          <button
            type="button"
            class="result-btn result-me"
            [class.active]="localPointWinner === 'me'"
            (click)="localPointWinner = 'me'"
          >○ 自分の得点</button>
          <button
            type="button"
            class="result-btn result-op"
            [class.active]="localPointWinner === 'op'"
            (click)="localPointWinner = 'op'"
          >● 相手の得点</button>
        </div>
      </div>

      <div class="field-group">
        <span class="field-label">このラリーのサーバー</span>
        <div class="segmented-control">
          <button type="button" [class.active]="localServer === 'me'" (click)="localServer = 'me'">自分</button>
          <button type="button" [class.active]="localServer === 'op'" (click)="localServer = 'op'">相手</button>
        </div>
      </div>

      <div class="field-group" *ngIf="localTags.length">
        <span class="field-label">選択中のタグ</span>
        <div class="tag-list">
          <button
            *ngFor="let tag of localTags"
            type="button"
            class="tag-chip active"
            (click)="toggleTag(tag)"
          >{{ tag }} ×</button>
        </div>
      </div>

      <div class="field-group">
        <span class="field-label">{{ localTags.length ? 'おすすめタグ' : 'ラリータグ' }}</span>
        <div class="tag-list">
          <button
            *ngFor="let tag of suggestedTags"
            type="button"
            class="tag-chip"
            [class.active]="localTags.includes(tag)"
            (click)="toggleTag(tag)"
          >{{ tag }}</button>
          <span *ngIf="!suggestedTags.length" class="no-tags">タグ候補なし</span>
        </div>
      </div>

      <label class="field-group">
        <span class="field-label">メモ（任意）</span>
        <textarea
          class="ui-input"
          rows="3"
          [value]="localNote"
          maxlength="300"
          placeholder="メモを入力してください"
          (input)="localNote = $any($event.target).value"
        ></textarea>
        <span class="char-count">{{ localNote.length }} / 300</span>
      </label>

      <label class="field-group">
        <span class="field-label">時刻（任意）</span>
        <input
          type="text"
          class="ui-input"
          [value]="localTimeInput"
          placeholder="00:00"
          (input)="localTimeInput = $any($event.target).value"
        />
      </label>

      <div class="drawer-actions">
        <button type="button" class="btn-save" (click)="onSave()">保存</button>
        <button type="button" class="btn-delete" (click)="delete.emit(rally.id)">🗑 削除</button>
        <button type="button" class="btn-cancel" (click)="close.emit()">キャンセル</button>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <div class="drawer-empty">記録一覧からラリーを選択してください</div>
  </ng-template>
</aside>
