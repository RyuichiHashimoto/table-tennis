<article class="step-card ui-panel status-card">
  <header class="step-head">
    <span class="step-number">2</span>
    <h2>現在の試合状況</h2>
  </header>

  <div class="status-grid">
    <div class="status-box status-box-accent">セット {{ selectedSetNo }}</div>
    <div class="status-box score-box">
      <span>自分</span>
      <strong>{{ score.me }} - {{ score.op }}</strong>
      <span>相手</span>
    </div>
    <div class="status-box">サーバー: <strong>{{ serverLabel }}</strong></div>
    <div class="status-box">状態: <strong>{{ statusLabel }}</strong></div>
  </div>

  <div class="next-action">
    <span class="next-action-icon">★</span>
    <strong>次の操作:</strong>
    <span>{{ nextActionMessage }}</span>
  </div>
</article>
