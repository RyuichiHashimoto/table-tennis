<section class="match-detail-layout">
  <section class="match-detail-top">
    <app-match-video-panel
      class="video-pane step-card step-card-video"
      [videoSourceUrl]="videoSourceUrl"
      [videoTitle]="videoTitle"
      [youtubeUrl]="youtubeUrl"
      [isLoadingVideo]="isLoadingVideo"
      (youtubeUrlChange)="youtubeUrl = $event"
      (loadYoutube)="loadYoutubeVideo()"
      (selectVideoFile)="onVideoFileSelected($event)"
      (currentTimeChange)="onVideoCurrentTimeChange($event)"
    ></app-match-video-panel>

    <section class="right-pane-stack">
      <app-match-status-panel
        [selectedSetNo]="selectedSetNo"
        [score]="currentSetScore"
        [serverLabel]="inputServerLabel"
        [statusLabel]="statusLabel"
        [nextActionMessage]="nextActionMessage"
      ></app-match-status-panel>

      <app-match-record-controls
        [initialServer]="initialServer"
        [inputSetNo]="inputSetNo"
        [insertAfterRally]="insertAfterRally"
        [editingRally]="editingRally"
        [selectedRally]="selectedRally"
        [selectedRallyTags]="selectedRallyTags"
        [message]="message"
        (startMatch)="startMatch()"
        (startRally)="startRally()"
        (scorePoint)="scorePoint($event)"
        (initialServerChange)="updateInitialServer($event)"
        (selectedRallyPointWinnerChange)="updateSelectedRallyPointWinner($event)"
        (selectedRallyTagToggle)="applyTagToSelectedRally($event)"
      ></app-match-record-controls>
    </section>
  </section>

  <section class="event-workspace">
    <app-match-timeline-panel
      class="timeline-pane"
      [rallies]="rallies"
      [selectedRallyId]="selectedRallyId"
      [selectedSetNo]="selectedSetNo"
      (seekToTime)="seekVideoTo($event)"
      (seekAfterRally)="seekVideoAfterRally($event)"
      (deleteRally)="deleteRally($event)"
      (toggleStar)="toggleRallyStar($event)"
      (selectRally)="selectRally($event)"
      (editRally)="editRally($event)"
      (insertAfterRally)="chooseInsertAfterRally($event)"
      (selectedSetChange)="selectSet($event)"
    ></app-match-timeline-panel>

    <app-selected-event-panel
      [selectedRally]="selectedRally"
      [selectedRallyTags]="selectedRallyTags"
      [score]="currentSetScore"
      (seekToTime)="seekVideoTo($event)"
      (pointWinnerChange)="updateSelectedRallyPointWinner($event)"
      (tagToggle)="applyTagToSelectedRally($event)"
      (deleteRally)="deleteRally($event)"
      (duplicateRally)="chooseInsertAfterRally($event)"
      (save)="saveInputScreenState()"
    ></app-selected-event-panel>
  </section>
</section>
