<section class="panel-stack ui-stack">
  <article class="panel ui-panel">
    <div class="section-head ui-section-head">
      <h2>試合一覧</h2>
      <button type="button" class="icon-button ui-button ui-button-icon" (click)="createMatch()">+</button>
    </div>
    <app-table-shell [empty]="matches.length === 0" emptyMessage="試合がありません。">
      <table class="matches-table ui-table">
        <thead><tr><th>ID</th><th>タイトル</th><th>作成日時</th><th>操作</th></tr></thead>
        <tbody>
          <tr *ngFor="let m of matches">
            <td>{{ m.id }}</td>
            <td>{{ m.title }}</td>
            <td>{{ m.createdAt }}</td>
            <td class="row-actions">
              <ui-icon-button
                src="/assets/icons/detail.svg"
                alt="詳細"
                ariaLabel="詳細"
                [showBorder]="false"
                (clicked)="openMatch(m.uuid)"
              ></ui-icon-button>
              <ui-icon-button
                src="/assets/icons/edit.svg"
                alt="編集"
                ariaLabel="編集"
                [showBorder]="false"
                (clicked)="editMatch(m.uuid)"
              ></ui-icon-button>
              <ui-icon-button
                src="/assets/icons/danger-trashbox.svg"
                alt=""
                ariaLabel="削除"
                [danger]="true"
                [showBorder]="false"
                (clicked)="deleteMatch(m.uuid)"
              ></ui-icon-button>
            </td>
          </tr>
        </tbody>
      </table>
    </app-table-shell>
  </article>
</section>

<app-confirm-modal
  [open]="!!pendingDeleteMatch"
  title="試合を削除"
  [message]="'「' + pendingDeleteMatch?.title + '」を削除します。\n関連するラリーと保存内容も削除されます。'"
  confirmLabel="削除する"
  cancelLabel="キャンセル"
  tone="danger"
  (cancelled)="cancelDelete()"
  (confirmed)="confirmDelete()"
></app-confirm-modal>

<app-match-title-modal
  [open]="!!pendingEditMatch"
  [currentTitle]="pendingEditMatch?.title ?? ''"
  (cancelled)="cancelEdit()"
  (saved)="confirmEdit($event)"
></app-match-title-modal>
